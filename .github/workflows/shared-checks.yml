name: Shared Checks

on:
  workflow_call:
    inputs:
      run_integration_tests:
        description: Run integration tests as part of shared checks
        required: false
        type: boolean
        default: false
      e2e_key_name:
        description: Named .keys.json publishable key used by E2EHost tests
        required: false
        type: string
        default: auth-email-code-password
      checkout_repository:
        description: Repository to checkout for shared checks
        required: false
        type: string
        default: ""
      checkout_ref:
        description: Git ref or SHA to checkout for shared checks
        required: false
        type: string
        default: ""
      report_check_runs:
        description: Report per-job check runs for manual PR CI
        required: false
        type: boolean
        default: false
      check_run_sha:
        description: Commit SHA to receive manual CI check runs
        required: false
        type: string
        default: ""
      check_run_target_url:
        description: Target URL for manual CI check runs
        required: false
        type: string
        default: ""
      check_run_name_prefix:
        description: Prefix for manual CI check run names
        required: false
        type: string
        default: Manual CI
    secrets:
      CLERK_TEST_KEYS_JSON:
        required: false

permissions:
  contents: read

jobs:
  prepare-manual-ci-check-runs:
    name: Prepare manual CI check runs
    if: inputs.report_check_runs && inputs.check_run_sha != ''
    runs-on: ubuntu-latest
    permissions:
      checks: write
    outputs:
      check_runs_json: ${{ steps.create.outputs.check_runs_json }}
    steps:
      - name: Create in-progress check runs
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_RUN_NAME_PREFIX: ${{ inputs.check_run_name_prefix }}
          CHECK_RUN_SHA: ${{ inputs.check_run_sha }}
          CHECK_RUN_TARGET_URL: ${{ inputs.check_run_target_url }}
          RUN_INTEGRATION_TESTS: ${{ inputs.run_integration_tests }}
        run: |
          set -euo pipefail

          target_url="$CHECK_RUN_TARGET_URL"
          if [ -z "$target_url" ]; then
            target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi

          check_run_names=(
            "$CHECK_RUN_NAME_PREFIX / Check formatting and linting"
            "$CHECK_RUN_NAME_PREFIX / Run ClerkKit tests on macOS"
            "$CHECK_RUN_NAME_PREFIX / Run ClerkKitUI tests on iOS"
            "$CHECK_RUN_NAME_PREFIX / Build iOS"
            "$CHECK_RUN_NAME_PREFIX / Build macOS"
            "$CHECK_RUN_NAME_PREFIX / Build macCatalyst"
            "$CHECK_RUN_NAME_PREFIX / Build watchOS"
            "$CHECK_RUN_NAME_PREFIX / Build tvOS"
            "$CHECK_RUN_NAME_PREFIX / Build visionOS"
          )

          if [ "$RUN_INTEGRATION_TESTS" = "true" ]; then
            check_run_names+=(
              "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (auth-email)"
              "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (auth-phone)"
              "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (auth-username-cleanup)"
              "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (user-profile-password-change)"
              "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (user-profile-security)"
              "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (session-tasks)"
              "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (account-reset)"
            )
          fi

          check_runs_json="$(jq -cn '{}')"
          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for name in "${check_run_names[@]}"; do
            check_run_id="$(
              gh api --method POST "repos/$GITHUB_REPOSITORY/check-runs" \
                -f name="$name" \
                -f head_sha="$CHECK_RUN_SHA" \
                -f status=in_progress \
                -f details_url="$target_url" \
                -f started_at="$started_at" \
                --jq '.id'
            )"
            check_runs_json="$(jq -c --arg name "$name" --argjson id "$check_run_id" '. + {($name): $id}' <<< "$check_runs_json")"
          done

          echo "check_runs_json=$check_runs_json" >> "$GITHUB_OUTPUT"

  format-and-lint:
    name: Check formatting and linting
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.checkout_repository || github.repository }}
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false

      - name: Install SwiftFormat
        run: ./scripts/install-swiftformat.sh

      - name: Install SwiftLint
        run: ./scripts/install-swiftlint.sh

      - name: Show formatter and linter versions
        run: |
          ./.tools/bin/swiftformat --version
          ./.tools/bin/swiftlint version

      - name: Check version consistency
        run: |
          set -euo pipefail
          ./scripts/check-version-consistency.sh

      - name: Check formatting and linting
        run: |
          set -euo pipefail
          git config core.autocrlf false
          git config core.eol lf
          make check

  test:
    name: Run ClerkKit tests on macOS
    needs: format-and-lint
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.checkout_repository || github.repository }}
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false

      - name: Verify macOS and Xcode version
        run: |
          sw_vers
          xcodebuild -version

      - name: Cache Swift dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftpm-macOS-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-macOS-

      - name: Run unit tests
        run: make test

      - name: Run macOS smoke build
        run: make smoke-macos

      - name: Setup integration test keys
        if: inputs.run_integration_tests
        env:
          CLERK_TEST_KEYS_JSON: ${{ secrets.CLERK_TEST_KEYS_JSON }}
        run: |
          set +x
          if [ -z "$CLERK_TEST_KEYS_JSON" ]; then
            echo "❌ Error: CLERK_TEST_KEYS_JSON secret is not set"
            echo "   Please configure CLERK_TEST_KEYS_JSON secret in repository settings"
            exit 1
          fi

          printf '%s\n' "$CLERK_TEST_KEYS_JSON" > .keys.json
          chmod 600 .keys.json
          echo "✅ Created .keys.json from CLERK_TEST_KEYS_JSON secret"

      - name: Run integration tests
        if: inputs.run_integration_tests
        run: |
          set -euo pipefail
          make test-integration

      - name: Cleanup integration test keys
        if: always() && inputs.run_integration_tests
        run: |
          rm -f .keys.json
          echo "✅ Cleaned up .keys.json"

  test-ui:
    name: Run ClerkKitUI tests on iOS
    needs: format-and-lint
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.checkout_repository || github.repository }}
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false

      - name: Verify macOS and Xcode version
        run: |
          sw_vers
          xcodebuild -version

      - name: Cache Swift dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftpm-ios-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-ios-

      - name: Run ClerkKitUI tests
        run: make test-ui

  test-e2e:
    name: Run required E2EHost smoke tests on iOS (${{ matrix.shard }})
    needs: format-and-lint
    if: inputs.run_integration_tests
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: auth-email
            only_testing: >-
              E2EHostE2ETests/E2EHostE2ETests/testEmailCodeSignUpThenPasswordSignIn()
          - shard: auth-phone
            only_testing: >-
              E2EHostE2ETests/E2EHostE2ETests/testPhoneCodeSignUpThenPhoneCodeSignIn()
          - shard: user-profile
            only_testing: >-
              E2EHostE2ETests/E2EHostE2ETests/testUserProfileSecurityDeletesAccount()
          - shard: session-task-cleanup
            only_testing: >-
              E2EHostE2ETests/E2EHostE2ETests/testSessionTaskSetupMfaSignUpCompletesAuthenticatorAppSetup()
              E2EHostE2ETests/E2EHostE2ETests/testInAppCleanupDeletesPendingUser()
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ inputs.checkout_repository || github.repository }}
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false

      - name: Verify macOS and Xcode version
        run: |
          sw_vers
          xcodebuild -version

      - name: Cache Swift dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .build
          key: swiftpm-e2e-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-e2e-

      - name: Setup E2E test keys
        env:
          CLERK_TEST_KEYS_JSON: ${{ secrets.CLERK_TEST_KEYS_JSON }}
        run: |
          set +x
          if [ -z "$CLERK_TEST_KEYS_JSON" ]; then
            echo "❌ Error: CLERK_TEST_KEYS_JSON secret is not set"
            echo "   Please configure CLERK_TEST_KEYS_JSON secret in repository settings"
            exit 1
          fi

          printf '%s\n' "$CLERK_TEST_KEYS_JSON" > .keys.json
          chmod 600 .keys.json
          echo "✅ Created .keys.json from CLERK_TEST_KEYS_JSON secret"

      - name: Validate E2E test instances
        env:
          CLERK_E2E_KEY_NAME: ${{ inputs.e2e_key_name }}
        run: |
          set -euo pipefail

          ./scripts/validate-e2e-test-instances.sh \
            "auth-email-code-password" \
            "auth-phone-code" \
            "session-task-setup-mfa" \
            "$CLERK_E2E_KEY_NAME"

      - name: Run required E2EHost smoke tests
        env:
          CLERK_E2E_KEY_NAME: ${{ inputs.e2e_key_name }}
          E2E_ONLY_TESTING: ${{ matrix.only_testing }}
          E2E_RESULT_BUNDLE_PATH: build/reports/E2EHost-${{ matrix.shard }}.xcresult
          E2E_XCODEBUILD_ATTEMPTS: "2"
        run: |
          set -euo pipefail
          make test-e2e

      - name: Summarize E2EHost timings
        if: always()
        env:
          E2E_RESULT_BUNDLE_PATH: build/reports/E2EHost-${{ matrix.shard }}.xcresult
        run: |
          set -euo pipefail

          if [ ! -d "$E2E_RESULT_BUNDLE_PATH" ]; then
            echo "No E2EHost result bundle found at $E2E_RESULT_BUNDLE_PATH."
            exit 0
          fi

          {
            echo "### Required E2EHost timings (${{ matrix.shard }})"
            echo
            echo "| Test | Result | Duration |"
            echo "| --- | --- | ---: |"
            xcrun xcresulttool get test-results tests --path "$E2E_RESULT_BUNDLE_PATH" --format json \
              | jq -r '.. | objects | select(.nodeType? == "Test Case") | "| `\(.name)` | \(.result // "") | \(((.durationInSeconds // 0) * 10 | round / 10))s |"'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload E2EHost result bundle
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: E2EHost-${{ matrix.shard }}-artifacts
          path: |
            build/reports/E2EHost-${{ matrix.shard }}.xcresult
            build/reports/E2EHost-${{ matrix.shard }}*.log
          if-no-files-found: ignore

      - name: Cleanup E2E test keys
        if: always()
        run: |
          rm -f .keys.json
          echo "✅ Cleaned up .keys.json"

  test-e2e-extended:
    name: Run extended E2EHost tests on iOS (${{ matrix.shard }})
    needs: format-and-lint
    if: inputs.run_integration_tests
    continue-on-error: true
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: auth-alternates
            only_testing: >-
              E2EHostE2ETests/E2EHostE2ETests/testMultiMethodsEmailSignUpThenEmailCodeSignInViaUseAnotherMethod()
              E2EHostE2ETests/E2EHostE2ETests/testMultiMethodsPhoneSignUpThenPhoneCodeSignInViaUseAnotherMethod()
              E2EHostE2ETests/E2EHostE2ETests/testUsernamePasswordSignUpThenUsernamePasswordSignInWithRequiredUserModelFields()
              E2EHostE2ETests/E2EHostE2ETests/testEmailCodeSignUpCompletesRequiredLegalConsent()
          - shard: user-profile-security-extended
            only_testing: >-
              E2EHostE2ETests/E2EHostE2ETests/testUserProfileSecurityChangesPassword()
              E2EHostE2ETests/E2EHostE2ETests/testUserProfileSecurityAddsTwoStepVerificationWithAuthenticatorApp()
              E2EHostE2ETests/E2EHostE2ETests/testUserProfileSecurityAddsTwoStepVerificationWithSmsCode()
          - shard: session-tasks-extended
            only_testing: >-
              E2EHostE2ETests/E2EHostE2ETests/testSessionTaskSetupMfaSignUpCompletesSmsCodeSetup()
              E2EHostE2ETests/E2EHostE2ETests/testSessionTaskChooseOrganizationSignUpAcceptsInvitationAndSelectsOrganization()
              E2EHostE2ETests/E2EHostE2ETests/testSessionTaskChooseOrganizationSignUpCreatesOrganization()
              E2EHostE2ETests/E2EHostE2ETests/testSessionTaskResetPasswordSignInCompletesPasswordReset()
          - shard: account-switching
            only_testing: >-
              E2EHostE2ETests/E2EHostE2ETests/testUserProfileAddsAccountThenSwitchesAccounts()
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Verify macOS and Xcode version
        run: |
          sw_vers
          xcodebuild -version

      - name: Cache Swift dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .build
          key: swiftpm-e2e-extended-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-e2e-extended-

      - name: Setup E2E test keys
        env:
          CLERK_TEST_KEYS_JSON: ${{ secrets.CLERK_TEST_KEYS_JSON }}
        run: |
          set +x
          if [ -z "$CLERK_TEST_KEYS_JSON" ]; then
            echo "❌ Error: CLERK_TEST_KEYS_JSON secret is not set"
            echo "   Please configure CLERK_TEST_KEYS_JSON secret in repository settings"
            exit 1
          fi

          printf '%s\n' "$CLERK_TEST_KEYS_JSON" > .keys.json
          chmod 600 .keys.json
          echo "✅ Created .keys.json from CLERK_TEST_KEYS_JSON secret"

      - name: Validate extended E2E test instances
        env:
          CLERK_E2E_KEY_NAME: ${{ inputs.e2e_key_name }}
        run: |
          set -euo pipefail

          ./scripts/validate-e2e-test-instances.sh \
            "auth-email-code-password" \
            "auth-legal-consent" \
            "auth-multi-methods" \
            "auth-username-password-user-model" \
            "session-task-choose-organization" \
            "session-task-reset-password" \
            "session-task-setup-mfa" \
            "$CLERK_E2E_KEY_NAME"

      - name: Run extended E2EHost tests
        env:
          CLERK_E2E_KEY_NAME: ${{ inputs.e2e_key_name }}
          E2E_ONLY_TESTING: ${{ matrix.only_testing }}
          E2E_RESULT_BUNDLE_PATH: build/reports/E2EHost-extended-${{ matrix.shard }}.xcresult
          E2E_XCODEBUILD_ATTEMPTS: "2"
        run: |
          set -euo pipefail
          make test-e2e

      - name: Summarize extended E2EHost timings
        if: always()
        env:
          E2E_RESULT_BUNDLE_PATH: build/reports/E2EHost-extended-${{ matrix.shard }}.xcresult
        run: |
          set -euo pipefail

          if [ ! -d "$E2E_RESULT_BUNDLE_PATH" ]; then
            echo "No extended E2EHost result bundle found at $E2E_RESULT_BUNDLE_PATH."
            exit 0
          fi

          {
            echo "### Extended E2EHost timings (${{ matrix.shard }})"
            echo
            echo "| Test | Result | Duration |"
            echo "| --- | --- | ---: |"
            xcrun xcresulttool get test-results tests --path "$E2E_RESULT_BUNDLE_PATH" --format json \
              | jq -r '.. | objects | select(.nodeType? == "Test Case") | "| `\(.name)` | \(.result // "") | \(((.durationInSeconds // 0) * 10 | round / 10))s |"'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload extended E2EHost result bundle
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: E2EHost-extended-${{ matrix.shard }}-artifacts
          path: |
            build/reports/E2EHost-extended-${{ matrix.shard }}.xcresult
            build/reports/E2EHost-extended-${{ matrix.shard }}*.log
          if-no-files-found: ignore

      - name: Cleanup E2E test keys
        if: always()
        run: |
          rm -f .keys.json
          echo "✅ Cleaned up .keys.json"

  build:
    name: Build ${{ matrix.platform }}
    needs: [test, test-ui]
    runs-on: macos-26
    strategy:
      matrix:
        platform: [iOS, macOS, macCatalyst, watchOS, tvOS, visionOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.checkout_repository || github.repository }}
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false

      - name: Verify macOS and Xcode version
        run: |
          sw_vers
          xcodebuild -version

      - name: Build for ${{ matrix.platform }}
        run: |
          set -euo pipefail
          echo "Building for ${{ matrix.platform }} using xcodebuild..."
          case "${{ matrix.platform }}" in
            iOS) destination="generic/platform=iOS Simulator" ;;
            macOS) destination="platform=macOS" ;;
            macCatalyst) destination="platform=macOS,variant=Mac Catalyst" ;;
            watchOS) destination="generic/platform=watchOS Simulator" ;;
            tvOS) destination="generic/platform=tvOS Simulator" ;;
            visionOS) destination="generic/platform=visionOS Simulator" ;;
            *) echo "❌ Unknown platform: ${{ matrix.platform }}"; exit 1 ;;
          esac
          xcodebuild build -workspace Clerk.xcworkspace -scheme ClerkKit -destination "$destination"

  report-manual-ci-check-runs:
    name: Report manual CI check runs
    needs:
      - prepare-manual-ci-check-runs
      - format-and-lint
      - test
      - test-ui
      - test-e2e
      - build
    if: always() && inputs.report_check_runs && inputs.check_run_sha != ''
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: write
    steps:
      - name: Report final check runs
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_RUN_NAME_PREFIX: ${{ inputs.check_run_name_prefix }}
          CHECK_RUNS_JSON: ${{ needs.prepare-manual-ci-check-runs.outputs.check_runs_json }}
          CHECK_RUN_TARGET_URL: ${{ inputs.check_run_target_url }}
          RUN_INTEGRATION_TESTS: ${{ inputs.run_integration_tests }}
        run: |
          set -euo pipefail

          target_url="$CHECK_RUN_TARGET_URL"
          if [ -z "$target_url" ]; then
            target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi

          jobs_json="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/jobs?per_page=100")"

          job_result() {
            local job_suffix="$1"
            jq -r --arg job_suffix "$job_suffix" '
              [.jobs[] | select(.name | endswith($job_suffix)) | .conclusion] | last // "skipped"
            ' <<< "$jobs_json"
          }

          check_run_id() {
            local name="$1"
            jq -r --arg name "$name" '.[$name] // empty' <<< "$CHECK_RUNS_JSON"
          }

          update_check_run() {
            local name="$1"
            local result="$2"
            local check_run_id
            local conclusion
            local summary

            check_run_id="$(check_run_id "$name")"
            if [ -z "$check_run_id" ]; then
              echo "::warning::No check run id found for '$name'."
              return
            fi

            case "$result" in
              success)
                conclusion="success"
                summary="Manual CI completed successfully."
                ;;
              cancelled)
                conclusion="cancelled"
                summary="Manual CI was cancelled."
                ;;
              skipped)
                conclusion="skipped"
                summary="Manual CI did not run because a dependency did not complete."
                ;;
              *)
                conclusion="failure"
                summary="Manual CI failed."
                ;;
            esac

            gh api --method PATCH "repos/$GITHUB_REPOSITORY/check-runs/$check_run_id" \
              -f status=completed \
              -f conclusion="$conclusion" \
              -f completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -f details_url="$target_url" \
              -f "output[title]=$name" \
              -f "output[summary]=$summary"
          }

          update_check_run "$CHECK_RUN_NAME_PREFIX / Check formatting and linting" "$(job_result "Check formatting and linting")"
          update_check_run "$CHECK_RUN_NAME_PREFIX / Run ClerkKit tests on macOS" "$(job_result "Run ClerkKit tests on macOS")"
          update_check_run "$CHECK_RUN_NAME_PREFIX / Run ClerkKitUI tests on iOS" "$(job_result "Run ClerkKitUI tests on iOS")"

          update_check_run "$CHECK_RUN_NAME_PREFIX / Build iOS" "$(job_result "Build iOS")"
          update_check_run "$CHECK_RUN_NAME_PREFIX / Build macOS" "$(job_result "Build macOS")"
          update_check_run "$CHECK_RUN_NAME_PREFIX / Build macCatalyst" "$(job_result "Build macCatalyst")"
          update_check_run "$CHECK_RUN_NAME_PREFIX / Build watchOS" "$(job_result "Build watchOS")"
          update_check_run "$CHECK_RUN_NAME_PREFIX / Build tvOS" "$(job_result "Build tvOS")"
          update_check_run "$CHECK_RUN_NAME_PREFIX / Build visionOS" "$(job_result "Build visionOS")"

          if [ "$RUN_INTEGRATION_TESTS" = "true" ]; then
            update_check_run "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (auth-email)" "$(job_result "Run E2EHost tests on iOS (auth-email)")"
            update_check_run "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (auth-phone)" "$(job_result "Run E2EHost tests on iOS (auth-phone)")"
            update_check_run "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (auth-username-cleanup)" "$(job_result "Run E2EHost tests on iOS (auth-username-cleanup)")"
            update_check_run "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (user-profile-password-change)" "$(job_result "Run E2EHost tests on iOS (user-profile-password-change)")"
            update_check_run "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (user-profile-security)" "$(job_result "Run E2EHost tests on iOS (user-profile-security)")"
            update_check_run "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (session-tasks)" "$(job_result "Run E2EHost tests on iOS (session-tasks)")"
            update_check_run "$CHECK_RUN_NAME_PREFIX / Run E2EHost tests on iOS (account-reset)" "$(job_result "Run E2EHost tests on iOS (account-reset)")"
          fi
