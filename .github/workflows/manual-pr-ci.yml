name: Manual PR CI

on:
  issue_comment:
    types:
      - created
      - edited

permissions:
  contents: read

jobs:
  resolve-pr-ci-request:
    name: Resolve PR CI request
    runs-on: ubuntu-latest
    concurrency:
      group: manual-ci-${{ github.repository }}-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      checks: write
      issues: write
      # PR issue comments return 403 with issues: write alone in this repository.
      pull-requests: write
    outputs:
      manual_check_run_id: ${{ steps.resolve.outputs.manual_check_run_id }}
      should_run: ${{ steps.resolve.outputs.should_run }}
      head_repository: ${{ steps.resolve.outputs.head_repository }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
    steps:
      - name: Resolve CI request
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ID: ${{ github.event.comment.id }}
          EVENT_ACTION: ${{ github.event.action }}
          IS_PULL_REQUEST: ${{ github.event.issue.pull_request != null }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          SERVER_URL: ${{ github.server_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          skip_ci() {
            echo "$1"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          }

          if [ "$IS_PULL_REQUEST" != "true" ]; then
            skip_ci "Ignoring comment because it is not on a pull request."
          fi

          if [ "$EVENT_ACTION" = "created" ]; then
            if ! grep -Eiq '^[[:space:]]*/run[[:space:]]+ci[[:space:]]*$' <<< "$COMMENT_BODY"; then
              skip_ci "Ignoring comment because it is not a CI command."
            fi
          elif [ "$EVENT_ACTION" = "edited" ]; then
            if ! grep -Fq '<!-- clerk-ios-manual-ci -->' <<< "$COMMENT_BODY"; then
              skip_ci "Ignoring comment because it is not the CI instructions comment."
            fi
          fi

          pr_json="$(gh api "repos/$REPO/pulls/$ISSUE_NUMBER")"
          author="$(jq -r '.user.login' <<< "$pr_json")"
          base_ref="$(jq -r '.base.ref' <<< "$pr_json")"
          pr_state="$(jq -r '.state' <<< "$pr_json")"
          head_repository="$(jq -r '.head.repo.full_name' <<< "$pr_json")"
          head_sha="$(jq -r '.head.sha' <<< "$pr_json")"
          run_url="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          permission_json="$(gh api "repos/$REPO/collaborators/$SENDER_LOGIN/permission" 2>/dev/null || printf '{}')"
          actor_permission="$(jq -r '.permission // ""' <<< "$permission_json")"
          actor_role="$(jq -r '.role_name // ""' <<< "$permission_json")"

          if [ "$base_ref" != "main" ]; then
            skip_ci "Ignoring comment because PR #$ISSUE_NUMBER targets '$base_ref', not 'main'."
          fi

          if [ "$pr_state" != "open" ]; then
            skip_ci "Ignoring comment because PR #$ISSUE_NUMBER is '$pr_state'."
          fi

          if [ -z "$head_repository" ] || [ "$head_repository" = "null" ]; then
            skip_ci "Ignoring comment because PR #$ISSUE_NUMBER no longer has a checkout repository."
          fi

          actor_is_author="false"
          if [ "$SENDER_LOGIN" = "$author" ]; then
            actor_is_author="true"
          fi

          actor_can_manage="false"
          if [ "$actor_permission" = "maintain" ] || [ "$actor_permission" = "admin" ] \
            || [ "$actor_role" = "maintain" ] || [ "$actor_role" = "admin" ]; then
            actor_can_manage="true"
          fi

          if [ "$actor_is_author" != "true" ] && [ "$actor_can_manage" != "true" ]; then
            skip_ci "Ignoring comment because $SENDER_LOGIN is not the PR author or a repository maintainer."
          fi

          request_kind=""
          if [ "$EVENT_ACTION" = "created" ]; then
            if grep -Eiq '^[[:space:]]*/run[[:space:]]+ci[[:space:]]*$' <<< "$COMMENT_BODY"; then
              request_kind="comment command"
            fi
          elif [ "$EVENT_ACTION" = "edited" ]; then
            if grep -Fq '<!-- clerk-ios-manual-ci -->' <<< "$COMMENT_BODY" \
              && grep -Eiq '^- \[[xX]\] Run CI[[:space:]]*$' <<< "$COMMENT_BODY"; then
              request_kind="checkbox"
            fi
          fi

          if [ -z "$request_kind" ]; then
            skip_ci "Ignoring comment because it is not an authorized CI request."
          fi

          if [ "$EVENT_ACTION" = "edited" ]; then
            unchecked_body="$(sed -E 's/^- \[[xX]\] Run CI[[:space:]]*$/- [ ] Run CI/' <<< "$COMMENT_BODY")"
            jq -n --arg body "$unchecked_body" '{body: $body}' \
              | gh api --method PATCH "repos/$REPO/issues/comments/$COMMENT_ID" --input -
          fi

          latest_manual_ci="$(
            gh api --method GET "repos/$REPO/commits/$head_sha/check-runs" \
              -f check_name="Manual CI" \
              --jq '.check_runs | sort_by(.started_at // .created_at) | last // {}'
          )"
          latest_manual_ci_id="$(jq -r '.id // ""' <<< "$latest_manual_ci")"
          latest_manual_ci_status="$(jq -r '.status // ""' <<< "$latest_manual_ci")"

          if [ -n "$latest_manual_ci_id" ] \
            && { [ "$latest_manual_ci_status" = "queued" ] \
              || [ "$latest_manual_ci_status" = "requested" ] \
              || [ "$latest_manual_ci_status" = "waiting" ] \
              || [ "$latest_manual_ci_status" = "pending" ]; }; then
            gh api --method PATCH "repos/$REPO/check-runs/$latest_manual_ci_id" \
              -f status=in_progress \
              -f details_url="$run_url" \
              -f started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -f "output[title]=Manual CI" \
              -f "output[summary]=Manual CI requested by $SENDER_LOGIN."
            manual_check_run_id="$latest_manual_ci_id"
          elif [ "$latest_manual_ci_status" = "in_progress" ]; then
            skip_ci "Ignoring request because Manual CI is already running for $head_sha."
          elif [ -n "$latest_manual_ci_id" ] && [ "$latest_manual_ci_status" != "completed" ]; then
            skip_ci "Ignoring request because Manual CI has unexpected status '$latest_manual_ci_status' for $head_sha."
          else
            manual_check_run_id="$(
              gh api --method POST "repos/$REPO/check-runs" \
                -f name="Manual CI" \
                -f head_sha="$head_sha" \
                -f status=in_progress \
                -f details_url="$run_url" \
                -f started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                -f "output[title]=Manual CI" \
                -f "output[summary]=Manual CI requested by $SENDER_LOGIN." \
                --jq '.id'
            )"
          fi

          {
            echo "manual_check_run_id=$manual_check_run_id"
            echo "should_run=true"
            echo "head_repository=$head_repository"
            echo "head_sha=$head_sha"
          } >> "$GITHUB_OUTPUT"

          echo "Accepted $request_kind from $SENDER_LOGIN for $head_repository@$head_sha."

  pr-checks:
    name: Shared checks
    needs: resolve-pr-ci-request
    if: needs.resolve-pr-ci-request.outputs.should_run == 'true'
    permissions:
      actions: read
      checks: write
      contents: read
    uses: ./.github/workflows/shared-checks.yml
    with:
      checkout_repository: ${{ needs.resolve-pr-ci-request.outputs.head_repository }}
      checkout_ref: ${{ needs.resolve-pr-ci-request.outputs.head_sha }}
      report_check_runs: true
      check_run_sha: ${{ needs.resolve-pr-ci-request.outputs.head_sha }}
      check_run_target_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      check_run_name_prefix: Manual CI

  report-pr-ci-status:
    name: Report PR CI status
    needs:
      - resolve-pr-ci-request
      - pr-checks
    if: always() && needs.resolve-pr-ci-request.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - name: Report check run on PR head
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_CHECK_RUN_ID: ${{ needs.resolve-pr-ci-request.outputs.manual_check_run_id }}
          REPO: ${{ github.repository }}
          RESULT: ${{ needs.pr-checks.result }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          case "$RESULT" in
            success)
              conclusion="success"
              summary="Manual CI completed successfully."
              ;;
            cancelled)
              conclusion="cancelled"
              summary="Manual CI was cancelled."
              ;;
            *)
              conclusion="failure"
              summary="Manual CI failed."
              ;;
          esac

          gh api --method PATCH "repos/$REPO/check-runs/$MANUAL_CHECK_RUN_ID" \
            -f status=completed \
            -f conclusion="$conclusion" \
            -f completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f details_url="$SERVER_URL/$REPO/actions/runs/$RUN_ID" \
            -f "output[title]=Manual CI" \
            -f "output[summary]=$summary"
