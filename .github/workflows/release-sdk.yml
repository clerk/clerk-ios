name: Release SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: SDK version to release (SemVer, for example 1.2.3)
        required: true
        type: string
      skip_expo_compat:
        description: "Skip the @clerk/expo compat gate (emergency override only)"
        required: false
        type: boolean
        default: false
      skip_reason:
        description: "Reason for skipping compat gate (required when skip=true)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-sdk
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize release actor
    runs-on: ubuntu-latest
    steps:
      - name: Ensure actor is maintainer or admin on main
        uses: actions/github-script@v7
        env:
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const actor = process.env.TRIGGERING_ACTOR || context.actor
            const refName = context.ref.replace("refs/heads/", "")

            if (refName !== "main") {
              core.setFailed(`Release workflow must be run from 'main'. Current ref is '${refName}'.`)
              return
            }

            const response = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: actor
            })

            const permission = String(response.data.permission || "").toLowerCase()
            const role = String(response.data.role_name || permission).toLowerCase()
            const allowed = new Set(["maintain", "admin"])

            core.info(`Actor '${actor}' has role='${role}', permission='${permission}'`)
            if (!allowed.has(role)) {
              core.setFailed(
                `Only maintainers/admins can run this workflow. Actor '${actor}' has role '${role}' (permission '${permission}').`
              )
            }

  checks:
    name: Shared checks (with integration tests)
    needs: authorize
    uses: ./.github/workflows/shared-checks.yml
    with:
      run_integration_tests: true
    secrets: inherit

  log-skip:
    name: "Log gate skip (emergency override)"
    runs-on: ubuntu-latest
    if: inputs.skip_expo_compat == true
    steps:
      - name: Fail if skip invoked without a reason
        if: ${{ !inputs.skip_reason }}
        run: |
          echo "::error::skip_expo_compat=true requires skip_reason to be provided"
          exit 1
      - name: Record skip to the job summary
        env:
          ACTOR: ${{ github.triggering_actor }}
          REASON: ${{ inputs.skip_reason }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## ⚠️ Expo compat gate skipped"
            echo ""
            echo "- Actor: @${ACTOR}"
            echo "- Reason: ${REASON}"
            echo "- Run: ${SERVER}/${REPO}/actions/runs/${RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"

  expo-compat:
    name: "@clerk/expo compat (Maestro)"
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 60
    if: |
      always()
      && needs.checks.result == 'success'
      && !(inputs.skip_expo_compat == true)
    # Release gate: dispatches the mobile-e2e.yml workflow in clerk/javascript
    # against this commit and waits for it to finish. The dispatched run is
    # the single source of truth for the @clerk/expo native test pipeline —
    # keeping the implementation there avoids duplicating the build/Maestro
    # steps in two repos and prevents drift.
    #
    # Requires the JAVASCRIPT_REPO_DISPATCH_TOKEN secret on this repo: a PAT
    # or GitHub App token with actions:write on clerk/javascript. iOS doesn't
    # need a snapshot-publish step because SPM resolves directly from a git
    # ref (the receiver patches packages/expo/app.plugin.js to use
    # `kind: revision` + this commit's SHA).
    #
    # Emergency override: maintainers can skip this gate by setting
    # skip_expo_compat=true AND providing skip_reason on workflow_dispatch.
    # The skip is recorded permanently in the Actions run log.
    env:
      JAVASCRIPT_REPO_REF: "main"
    steps:
      - name: Dispatch mobile-e2e in clerk/javascript
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.JAVASCRIPT_REPO_DISPATCH_TOKEN }}
          JS_REF: ${{ env.JAVASCRIPT_REPO_REF }}
          IOS_REF: ${{ github.sha }}
        run: |
          dispatch_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "dispatch_time=$dispatch_time" >> "$GITHUB_OUTPUT"

          gh workflow run mobile-e2e.yml \
            -R clerk/javascript \
            -r "$JS_REF" \
            -f clerk_ios_ref="$IOS_REF"

      - name: Resolve dispatched run id
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.JAVASCRIPT_REPO_DISPATCH_TOKEN }}
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
        run: |
          run_id=""
          for i in $(seq 1 24); do
            sleep 5
            run_id=$(gh api \
              "repos/clerk/javascript/actions/workflows/mobile-e2e.yml/runs?event=workflow_dispatch&created=%3E${DISPATCH_TIME}" \
              --jq '.workflow_runs | sort_by(.created_at) | .[-1].id // empty')
            if [ -n "$run_id" ]; then
              echo "Found dispatched run: $run_id"
              break
            fi
          done
          if [ -z "$run_id" ]; then
            echo "::error::Could not find dispatched mobile-e2e run in clerk/javascript within 2 minutes"
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "run_url=https://github.com/clerk/javascript/actions/runs/$run_id" >> "$GITHUB_OUTPUT"

      - name: Link to dispatched run in job summary
        env:
          RUN_URL: ${{ steps.resolve.outputs.run_url }}
          IOS_REF: ${{ github.sha }}
          JS_REF: ${{ env.JAVASCRIPT_REPO_REF }}
        run: |
          {
            echo "## @clerk/expo compat (Maestro)"
            echo ""
            echo "Dispatched: ${RUN_URL}"
            echo ""
            echo "clerk-ios ref:        \`${IOS_REF}\`"
            echo "clerk/javascript ref: \`${JS_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for dispatched run to complete
        env:
          GH_TOKEN: ${{ secrets.JAVASCRIPT_REPO_DISPATCH_TOKEN }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        run: |
          gh run watch "$RUN_ID" \
            -R clerk/javascript \
            --exit-status

  publish:
    name: Bump, tag, and publish release
    needs: [checks, expo-compat, log-skip]
    # Publish when:
    #   - checks succeeded, AND
    #   - expo-compat succeeded, OR the gate was explicitly skipped via
    #     workflow_dispatch with skip_expo_compat=true and a reason.
    if: |
      always()
      && needs.checks.result == 'success'
      && (
        needs.expo-compat.result == 'success'
        || (inputs.skip_expo_compat == true && needs.log-skip.result == 'success')
      )
    runs-on: macos-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.IOS_RELEASE_PUSH_TOKEN }}

      - name: Validate version input and detect rerun state
        id: release_state
        run: |
          set -euo pipefail

          version_file="Sources/ClerkKit/Utils/Version.swift"

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "❌ Invalid version: '$RELEASE_VERSION'. Expected SemVer (for example 1.2.3 or 1.2.3-rc.1)."
            exit 1
          fi

          current_version="$(sed -n 's/.*sdkVersion: String = "\([^"]*\)".*/\1/p' "$version_file")"
          if [ -z "$current_version" ]; then
            echo "❌ Could not read current SDK version from $version_file"
            exit 1
          fi

          version_already_set="false"
          if [ "$current_version" = "$RELEASE_VERSION" ]; then
            version_already_set="true"
            echo "ℹ️ $version_file already contains sdkVersion: String = \"$RELEASE_VERSION\"."
          fi

          release_tag="$RELEASE_VERSION"
          tag_already_exists="false"
          if git rev-parse --verify "refs/tags/$release_tag" >/dev/null 2>&1; then
            tag_already_exists="true"
            echo "ℹ️ Tag '$release_tag' already exists locally; skipping git tag \"$release_tag\"."
          fi

          if git ls-remote --tags origin "refs/tags/$release_tag" | grep -q "$release_tag"; then
            tag_already_exists="true"
            echo "ℹ️ Tag '$release_tag' already exists on origin; skipping git push origin \"$release_tag\"."
          fi

          echo "version_already_set=$version_already_set" >> "$GITHUB_OUTPUT"
          echo "tag_already_exists=$tag_already_exists" >> "$GITHUB_OUTPUT"

      - name: Update SDK version constant
        if: steps.release_state.outputs.version_already_set != 'true'
        run: |
          set -euo pipefail

          version_file="Sources/ClerkKit/Utils/Version.swift"
          sed -i '' -E "s/(sdkVersion: String = \").*(\")/\\1$RELEASE_VERSION\\2/" "$version_file"

          echo "Updated version file:"
          grep -n "sdkVersion" "$version_file"

      - name: Verify version change is present
        run: |
          set -euo pipefail

          version_file="Sources/ClerkKit/Utils/Version.swift"
          if ! grep -q "sdkVersion: String = \"$RELEASE_VERSION\"" "$version_file"; then
            echo "❌ Failed to apply SDK version update in $version_file"
            exit 1
          fi

      - name: Commit release version bump to main
        run: |
          set -euo pipefail

          if [ "${{ steps.release_state.outputs.version_already_set }}" = "true" ]; then
            echo "ℹ️ Skipping commit because Sources/ClerkKit/Utils/Version.swift already matches $RELEASE_VERSION."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Sources/ClerkKit/Utils/Version.swift

          if git diff --cached --quiet; then
            echo "❌ No changes to commit for release version bump"
            exit 1
          fi

          git commit -m "chore(release): $RELEASE_VERSION"
          git push origin HEAD:main

      - name: Create and push release tag
        run: |
          set -euo pipefail

          release_tag="$RELEASE_VERSION"

          if [ "${{ steps.release_state.outputs.tag_already_exists }}" = "true" ]; then
            echo "ℹ️ Skipping git tag \"$release_tag\" and push because tag already exists."
            exit 0
          fi

          git tag "$release_tag"
          git push origin "$release_tag"

      - name: Determine prerelease flag
        id: prerelease
        run: |
          if [[ "$RELEASE_VERSION" == *-* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          token: ${{ secrets.IOS_RELEASE_PUSH_TOKEN }}
