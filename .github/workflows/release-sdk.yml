name: Release SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: SDK version to release (SemVer, for example 1.2.3)
        required: true
        type: string
      skip_expo_compat:
        description: "Skip the @clerk/expo compat gate (emergency override only)"
        required: false
        type: boolean
        default: false
      skip_reason:
        description: "Reason for skipping compat gate (required when skip=true)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-sdk
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize release actor
    runs-on: ubuntu-latest
    steps:
      - name: Ensure actor is maintainer or admin on main
        uses: actions/github-script@v7
        env:
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const actor = process.env.TRIGGERING_ACTOR || context.actor
            const refName = context.ref.replace("refs/heads/", "")

            if (refName !== "main") {
              core.setFailed(`Release workflow must be run from 'main'. Current ref is '${refName}'.`)
              return
            }

            const response = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: actor
            })

            const permission = String(response.data.permission || "").toLowerCase()
            const role = String(response.data.role_name || permission).toLowerCase()
            const allowed = new Set(["maintain", "admin"])

            core.info(`Actor '${actor}' has role='${role}', permission='${permission}'`)
            if (!allowed.has(role)) {
              core.setFailed(
                `Only maintainers/admins can run this workflow. Actor '${actor}' has role '${role}' (permission '${permission}').`
              )
            }

  checks:
    name: Shared checks (with integration tests)
    needs: authorize
    uses: ./.github/workflows/shared-checks.yml
    with:
      run_integration_tests: true
    secrets: inherit

  log-skip:
    name: "Log gate skip (emergency override)"
    needs: authorize
    runs-on: ubuntu-latest
    if: inputs.skip_expo_compat == true
    steps:
      - name: Fail if skip invoked without a reason
        if: ${{ !inputs.skip_reason }}
        run: |
          echo "::error::skip_expo_compat=true requires skip_reason to be provided"
          exit 1
      - name: Record skip to the job summary
        run: |
          {
            echo "## ⚠️ Expo compat gate skipped"
            echo ""
            echo "- Actor: @${{ github.triggering_actor }}"
            echo "- Reason: ${{ inputs.skip_reason }}"
            echo "- Version: ${{ inputs.version }}"
            echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

  expo-compat:
    name: "@clerk/expo compat (Maestro)"
    needs: checks
    runs-on: macos-15
    timeout-minutes: 60
    if: inputs.skip_expo_compat != true
    # Release gate: verifies the clerk-ios ref about to be published does not
    # break @clerk/expo. If any Maestro flow fails, the publish job below will
    # not run.
    #
    # Emergency override: maintainers can skip this gate by setting
    # skip_expo_compat=true AND providing skip_reason on workflow_dispatch.
    # The skip is recorded permanently in the Actions run log.
    env:
      CLERK_IOS_SHA: ${{ github.sha }}
      JAVASCRIPT_REPO_REF: "main"
      QUICKSTART_REPO_REF: "main"
    steps:
      - name: Checkout @clerk/javascript
        uses: actions/checkout@v4
        with:
          repository: clerk/javascript
          ref: ${{ env.JAVASCRIPT_REPO_REF }}
          path: javascript

      - name: Checkout clerk-expo-quickstart
        uses: actions/checkout@v4
        with:
          repository: clerk/clerk-expo-quickstart
          ref: ${{ env.QUICKSTART_REPO_REF }}
          path: clerk-expo-quickstart

      - name: Patch @clerk/expo app.plugin.js to pin clerk-ios to this SHA
        working-directory: javascript
        run: |
          # Change the SPM dependency from exactVersion to revision (SHA-pinned)
          # so the quickstart builds against the exact clerk-ios commit being released.
          sed -i '' "s|const CLERK_IOS_VERSION = '.*'|const CLERK_IOS_VERSION = '${CLERK_IOS_SHA}'|" packages/expo/app.plugin.js
          sed -i '' "s|kind: 'exactVersion'|kind: 'revision'|" packages/expo/app.plugin.js
          sed -i '' "s|version: CLERK_IOS_VERSION|revision: CLERK_IOS_VERSION|" packages/expo/app.plugin.js

          echo "=== Patched app.plugin.js ==="
          grep -n "CLERK_IOS_VERSION\|kind:\|revision:" packages/expo/app.plugin.js | head -10

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: javascript/pnpm-lock.yaml

      - name: Install @clerk/javascript deps
        working-directory: javascript
        run: pnpm install --frozen-lockfile

      - name: Build @clerk/expo
        working-directory: javascript
        run: pnpm turbo build --filter=@clerk/expo...

      - name: Install quickstart deps
        working-directory: clerk-expo-quickstart/NativeComponentQuickstart
        run: pnpm install

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ env.CLERK_IOS_SHA }}

      - name: Expo prebuild iOS
        working-directory: clerk-expo-quickstart/NativeComponentQuickstart
        run: npx expo prebuild --clean --platform ios

      - name: Build and boot iOS Simulator
        working-directory: clerk-expo-quickstart/NativeComponentQuickstart
        run: |
          xcrun simctl boot "iPhone 16 Pro" || true
          npx expo run:ios --configuration Release --no-bundler --device "iPhone 16 Pro"

      - name: Run iOS Maestro flows
        working-directory: javascript/integration-mobile
        env:
          CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
          CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          maestro test --exclude-tags androidOnly,manual,skip flows/

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-compat
          path: ~/.maestro/tests

  publish:
    name: Bump, tag, and publish release
    needs: [checks, expo-compat, log-skip]
    runs-on: macos-latest
    # Publish when checks passed AND:
    #   - expo-compat succeeded, OR
    #   - the gate was explicitly skipped via skip_expo_compat=true + skip_reason
    if: |
      always()
      && needs.checks.result == 'success'
      && (
        needs.expo-compat.result == 'success'
        || (inputs.skip_expo_compat == true && needs.log-skip.result == 'success')
      )
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.IOS_RELEASE_PUSH_TOKEN }}

      - name: Validate version input and detect rerun state
        id: release_state
        run: |
          set -euo pipefail

          version_file="Sources/ClerkKit/Utils/Version.swift"

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "❌ Invalid version: '$RELEASE_VERSION'. Expected SemVer (for example 1.2.3 or 1.2.3-rc.1)."
            exit 1
          fi

          current_version="$(sed -n 's/.*sdkVersion: String = "\([^"]*\)".*/\1/p' "$version_file")"
          if [ -z "$current_version" ]; then
            echo "❌ Could not read current SDK version from $version_file"
            exit 1
          fi

          version_already_set="false"
          if [ "$current_version" = "$RELEASE_VERSION" ]; then
            version_already_set="true"
            echo "ℹ️ $version_file already contains sdkVersion: String = \"$RELEASE_VERSION\"."
          fi

          release_tag="$RELEASE_VERSION"
          tag_already_exists="false"
          if git rev-parse --verify "refs/tags/$release_tag" >/dev/null 2>&1; then
            tag_already_exists="true"
            echo "ℹ️ Tag '$release_tag' already exists locally; skipping git tag \"$release_tag\"."
          fi

          if git ls-remote --tags origin "refs/tags/$release_tag" | grep -q "$release_tag"; then
            tag_already_exists="true"
            echo "ℹ️ Tag '$release_tag' already exists on origin; skipping git push origin \"$release_tag\"."
          fi

          echo "version_already_set=$version_already_set" >> "$GITHUB_OUTPUT"
          echo "tag_already_exists=$tag_already_exists" >> "$GITHUB_OUTPUT"

      - name: Update SDK version constant
        if: steps.release_state.outputs.version_already_set != 'true'
        run: |
          set -euo pipefail

          version_file="Sources/ClerkKit/Utils/Version.swift"
          sed -i '' -E "s/(sdkVersion: String = \").*(\")/\\1$RELEASE_VERSION\\2/" "$version_file"

          echo "Updated version file:"
          grep -n "sdkVersion" "$version_file"

      - name: Verify version change is present
        run: |
          set -euo pipefail

          version_file="Sources/ClerkKit/Utils/Version.swift"
          if ! grep -q "sdkVersion: String = \"$RELEASE_VERSION\"" "$version_file"; then
            echo "❌ Failed to apply SDK version update in $version_file"
            exit 1
          fi

      - name: Commit release version bump to main
        run: |
          set -euo pipefail

          if [ "${{ steps.release_state.outputs.version_already_set }}" = "true" ]; then
            echo "ℹ️ Skipping commit because Sources/ClerkKit/Utils/Version.swift already matches $RELEASE_VERSION."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Sources/ClerkKit/Utils/Version.swift

          if git diff --cached --quiet; then
            echo "❌ No changes to commit for release version bump"
            exit 1
          fi

          git commit -m "chore(release): $RELEASE_VERSION"
          git push origin HEAD:main

      - name: Create and push release tag
        run: |
          set -euo pipefail

          release_tag="$RELEASE_VERSION"

          if [ "${{ steps.release_state.outputs.tag_already_exists }}" = "true" ]; then
            echo "ℹ️ Skipping git tag \"$release_tag\" and push because tag already exists."
            exit 0
          fi

          git tag "$release_tag"
          git push origin "$release_tag"

      - name: Determine prerelease flag
        id: prerelease
        run: |
          if [[ "$RELEASE_VERSION" == *-* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          token: ${{ secrets.IOS_RELEASE_PUSH_TOKEN }}
