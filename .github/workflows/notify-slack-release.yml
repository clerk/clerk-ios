name: Notify Slack of release

on:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to announce.
        required: true
        type: string
      release_url:
        description: GitHub release URL.
        required: false
        type: string
        default: ""
      expo_bump_pr_url:
        description: Optional @clerk/expo bump PR URL.
        required: false
        type: string
        default: ""
    secrets:
      SLACK_WEBHOOK_URL:
        required: false

permissions:
  contents: read

jobs:
  notify:
    name: Notify Slack
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_URL: ${{ inputs.release_url }}
          EXPO_BUMP_PR_URL: ${{ inputs.expo_bump_pr_url }}
        run: |
          set -euo pipefail

          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL is not configured; skipping Slack notification"
            exit 0
          fi

          release_url="$RELEASE_URL"
          if [ -z "$release_url" ]; then
            release_url="https://github.com/$GITHUB_REPOSITORY/releases/tag/$RELEASE_TAG"
          fi

          context_links="<${release_url}|View the GitHub release>"
          if [ -n "$EXPO_BUMP_PR_URL" ]; then
            context_links="$context_links · <$EXPO_BUMP_PR_URL|View the Expo bump PR>"
          fi

          PAYLOAD=$(jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg context_links "$context_links" \
            '{
              text: "Clerk iOS SDK \($tag) has been released",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*Clerk iOS SDK \($tag) has been released*"
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: $context_links
                    }
                  ]
                }
              ]
            }')

          curl --fail-with-body \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --retry-max-time 60 \
            --retry-all-errors \
            --request POST \
            --header "Content-type: application/json" \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
