name: E2E Branch Checks

on:
  workflow_dispatch:
    inputs:
      e2e_key_name:
        description: Named .keys.json publishable key used by E2EHost tests
        required: true
        type: choice
        default: auth-email-code-password
        options:
          - auth-email-code-password
          - auth-legal-consent
          - auth-multi-methods
          - auth-phone-code
          - auth-username-password-user-model
          - session-task-choose-organization
          - session-task-reset-password
          - session-task-setup-mfa
          - with-email-codes

permissions:
  contents: read

jobs:
  checks:
    name: Shared checks with E2E
    uses: ./.github/workflows/shared-checks.yml
    with:
      run_integration_tests: true
      e2e_key_name: ${{ inputs.e2e_key_name }}
    secrets: inherit
