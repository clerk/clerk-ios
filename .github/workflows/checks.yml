name: Checks

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - reopened
    branches:
      - main
  issue_comment:
    types:
      - created
      - edited

permissions:
  contents: read

jobs:
  checks:
    name: Shared checks
    if: github.event_name == 'push'
    uses: ./.github/workflows/shared-checks.yml
    secrets: inherit

  add-ci-instructions:
    name: Add CI instructions
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Add or update CI instructions
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          marker="<!-- clerk-ios-manual-ci -->"
          body="$(cat <<'MARKDOWN'
          <!-- clerk-ios-manual-ci -->
          ## CI paused

          CI does not run automatically on pull request updates while review feedback is being addressed.

          To run CI for the latest commit, the PR author or a repository maintainer can comment:

          `/run ci`

          Quick action:

          - [ ] Run CI
          MARKDOWN
          )"

          existing_comment_id="$(
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" \
              | tail -n 1
          )"

          if [ -n "$existing_comment_id" ]; then
            jq -n --arg body "$body" '{body: $body}' \
              | gh api --method PATCH "repos/$REPO/issues/comments/$existing_comment_id" --input -
          else
            jq -n --arg body "$body" '{body: $body}' \
              | gh api --method POST "repos/$REPO/issues/$PR_NUMBER/comments" --input -
          fi

  resolve-pr-ci-request:
    name: Resolve PR CI request
    if: >
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request != null
      && (
        (github.event.action == 'created' && contains(github.event.comment.body, '/run ci'))
        || (github.event.action == 'edited' && contains(github.event.comment.body, '<!-- clerk-ios-manual-ci -->'))
      )
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      statuses: write
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      head_repository: ${{ steps.resolve.outputs.head_repository }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
    steps:
      - name: Resolve comment command
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ID: ${{ github.event.comment.id }}
          EVENT_ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          SERVER_URL: ${{ github.server_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          pr_json="$(gh api "repos/$REPO/pulls/$ISSUE_NUMBER")"
          author="$(jq -r '.user.login' <<< "$pr_json")"
          base_ref="$(jq -r '.base.ref' <<< "$pr_json")"
          pr_state="$(jq -r '.state' <<< "$pr_json")"
          head_repository="$(jq -r '.head.repo.full_name' <<< "$pr_json")"
          head_sha="$(jq -r '.head.sha' <<< "$pr_json")"
          run_url="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          permission_json="$(gh api "repos/$REPO/collaborators/$SENDER_LOGIN/permission" 2>/dev/null || printf '{}')"
          actor_permission="$(jq -r '.permission // ""' <<< "$permission_json")"
          actor_role="$(jq -r '.role_name // ""' <<< "$permission_json")"

          if [ "$base_ref" != "main" ]; then
            echo "Ignoring comment because PR #$ISSUE_NUMBER targets '$base_ref', not 'main'."
            exit 0
          fi

          if [ "$pr_state" != "open" ]; then
            echo "Ignoring comment because PR #$ISSUE_NUMBER is '$pr_state'."
            exit 0
          fi

          if [ -z "$head_repository" ] || [ "$head_repository" = "null" ]; then
            echo "Ignoring comment because PR #$ISSUE_NUMBER no longer has a checkout repository."
            exit 0
          fi

          actor_is_author="false"
          if [ "$SENDER_LOGIN" = "$author" ]; then
            actor_is_author="true"
          fi

          actor_can_manage="false"
          if [ "$actor_permission" = "maintain" ] || [ "$actor_permission" = "admin" ] \
            || [ "$actor_role" = "maintain" ] || [ "$actor_role" = "admin" ]; then
            actor_can_manage="true"
          fi

          if [ "$actor_is_author" != "true" ] && [ "$actor_can_manage" != "true" ]; then
            echo "Ignoring comment because $SENDER_LOGIN is not the PR author or a repository maintainer."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          request_kind=""
          if [ "$EVENT_ACTION" = "created" ]; then
            if grep -Eiq '^[[:space:]]*/run[[:space:]]+ci[[:space:]]*$' <<< "$COMMENT_BODY"; then
              request_kind="comment command"
            fi
          elif [ "$EVENT_ACTION" = "edited" ]; then
            if grep -Fq '<!-- clerk-ios-manual-ci -->' <<< "$COMMENT_BODY" \
              && grep -Eiq '^- \[[xX]\] Run CI[[:space:]]*$' <<< "$COMMENT_BODY"; then
              request_kind="checkbox"
            fi
          fi

          if [ -z "$request_kind" ]; then
            echo "Ignoring comment because it is not an authorized CI request."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_ACTION" = "edited" ]; then
            unchecked_body="$(sed -E 's/^- \[[xX]\] Run CI[[:space:]]*$/- [ ] Run CI/' <<< "$COMMENT_BODY")"
            jq -n --arg body "$unchecked_body" '{body: $body}' \
              | gh api --method PATCH "repos/$REPO/issues/comments/$COMMENT_ID" --input -
          fi

          gh api --method POST "repos/$REPO/statuses/$head_sha" \
            -f state=pending \
            -f context="Manual CI" \
            -f target_url="$run_url" \
            -f description="Manual CI requested by $SENDER_LOGIN."

          {
            echo "should_run=true"
            echo "head_repository=$head_repository"
            echo "head_sha=$head_sha"
          } >> "$GITHUB_OUTPUT"

          echo "Accepted $request_kind from $SENDER_LOGIN for $head_repository@$head_sha."

  pr-checks:
    name: Shared checks
    needs: resolve-pr-ci-request
    if: needs.resolve-pr-ci-request.outputs.should_run == 'true'
    uses: ./.github/workflows/shared-checks.yml
    with:
      checkout_repository: ${{ needs.resolve-pr-ci-request.outputs.head_repository }}
      checkout_ref: ${{ needs.resolve-pr-ci-request.outputs.head_sha }}

  report-pr-ci-status:
    name: Report PR CI status
    needs:
      - resolve-pr-ci-request
      - pr-checks
    if: always() && needs.resolve-pr-ci-request.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Report status on PR head
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.resolve-pr-ci-request.outputs.head_sha }}
          REPO: ${{ github.repository }}
          RESULT: ${{ needs.pr-checks.result }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          case "$RESULT" in
            success)
              state="success"
              description="Manual CI completed successfully."
              ;;
            cancelled)
              state="error"
              description="Manual CI was cancelled."
              ;;
            *)
              state="failure"
              description="Manual CI failed."
              ;;
          esac

          gh api --method POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="$state" \
            -f context="Manual CI" \
            -f target_url="$SERVER_URL/$REPO/actions/runs/$RUN_ID" \
            -f description="$description"
