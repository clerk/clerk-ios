name: Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: Shared checks
    uses: ./.github/workflows/shared-checks.yml
    with:
      run_integration_tests: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'sean/Explore-E2E-tests' }}
    secrets: inherit
